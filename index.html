<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>drakenfract</title>

<style>

body{
background:#0f0f0f;
color:white;
font-family:sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
text-align:center;
}

h1{
font-weight:200;
letter-spacing:4px;
}

.pads{
display:grid;
grid-template-columns:repeat(2,140px);
gap:20px;
margin-top:40px;
}

.pad{
width:140px;
height:140px;
background:#1c1c1c;
border:none;
border-radius:10px;
cursor:pointer;
transition:.15s;
}

.pad.active{
background:#555;
}

.pad.flash{
box-shadow:0 0 12px rgba(255,255,255,0.35);
transform:scale(1.02);
}

</style>
</head>

<body>

<div class="container">

<h1>drakenfract</h1>

<div class="pads">
<button class="pad" data-pad="pad1"></button>
<button class="pad" data-pad="pad2"></button>
<button class="pad" data-pad="pad3"></button>
<button class="pad" data-pad="pad4"></button>
</div>

</div>

<script>

/* AUDIO */

let audioCtx = new (window.AudioContext || window.webkitAudioContext)({latencyHint:"interactive"})

document.body.addEventListener("click", async () => {
await audioCtx.resume()
},{once:true})

/* TEMPO */

let bpm = 72
let beat = 60 / bpm

/* SPACE */

let masterGain = audioCtx.createGain()
masterGain.gain.value = 0.9

let delay = audioCtx.createDelay()
delay.delayTime.value = 0.3

let feedback = audioCtx.createGain()
feedback.gain.value = 0.22

delay.connect(feedback)
feedback.connect(delay)

delay.connect(masterGain)
masterGain.connect(audioCtx.destination)

/* SAMPLES */

let buffers={}
let samplesReady=false

async function loadSample(name,file){

let r = await fetch(file)
let b = await r.arrayBuffer()
buffers[name] = await audioCtx.decodeAudioData(b)

}

Promise.all([
loadSample("metal","metal.mp3"),
loadSample("machine","machine.mp3"),
loadSample("voice","voice.mp3")
]).then(()=>{

samplesReady=true
console.log("samples ready")

})

/* DRIFT FIELD */

let drift={
metal:Math.random(),
machine:Math.random(),
voice:Math.random()
}

setInterval(()=>{

drift.metal += (Math.random()-0.5)*0.002
drift.machine += (Math.random()-0.5)*0.002
drift.voice += (Math.random()-0.5)*0.002

for(let k in drift){
drift[k]=Math.max(0,Math.min(1,drift[k]))
}

},400)

/* PITCH FIELD */

const scale=[0.75,0.9,1,1.2,1.33]

function quantPitch(){
return scale[Math.floor(Math.random()*scale.length)]
}

/* GRAIN ENGINE */

function playGrain(sample,pitch=1,time=null){

let buffer=buffers[sample]
if(!buffer) return

let now=time || audioCtx.currentTime

let src = audioCtx.createBufferSource()
let gain = audioCtx.createGain()

let grainSize = 0.09 + Math.random()*0.05
let start = drift[sample] * buffer.duration

src.buffer = buffer
src.playbackRate.value = pitch * quantPitch()

src.connect(gain)
gain.connect(delay)

gain.gain.setValueAtTime(0,now)
gain.gain.linearRampToValueAtTime(0.45,now+0.01)
gain.gain.linearRampToValueAtTime(0,now+grainSize)

src.start(now,start,grainSize)
src.stop(now+grainSize)

}

/* VISUAL FEEDBACK */

function flashPad(name){

let pad=document.querySelector(`[data-pad="${name}"]`)

pad.classList.add("flash")

setTimeout(()=>{
pad.classList.remove("flash")
},120)

}

/* PAD STATES */

let padState={
pad1:false,
pad2:false,
pad3:false,
pad4:false
}

/* RHYTHM ENGINE */

let step=0

setInterval(()=>{

if(!samplesReady) return

let now=audioCtx.currentTime

if(padState.pad1){
playGrain("metal",0.8,now)
if(Math.random()<0.3) flashPad("pad1")
}

if(padState.pad2 && step%2===0){
playGrain("machine",1,now)
if(Math.random()<0.3) flashPad("pad2")
}

if(padState.pad3 && step%3===0){
playGrain("voice",0.8,now)
if(Math.random()<0.3) flashPad("pad3")
}

if(padState.pad4 && step%4===0){
playGrain("voice",-1,now)
if(Math.random()<0.3) flashPad("pad4")
}

step++

},beat*1000)

/* PAD INTERACTION */

document.querySelectorAll(".pad").forEach(pad=>{

let name=pad.dataset.pad

pad.addEventListener("click",toggle)
pad.addEventListener("touchstart",(e)=>{
e.preventDefault()
toggle()
})

function toggle(){

if(!samplesReady) return

padState[name]=!padState[name]

pad.classList.toggle("active")

}

})

</script>

</body>
</html>
