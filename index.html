<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drakenfract</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        header {
            background: #333;
            color: #fff;
            padding: 10px;
            text-align: center;
        }
        .container {
            padding: 20px;
        }
        @media (max-width: 768px) {
            .container {
                padding: 10px;
            }
            header {
                padding: 5px;
            }
        }
        @media (max-width: 480px) {
            header {
                text-align: left;
                padding: 5px;
            }
            .container {
                padding: 5px;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>Welcome to Drakenfract</h1>
    </header>
    <div class="container">
        <p>Your content goes here...</p>
    </div>

</body>
</html>
