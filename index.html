<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>drakenfract</title>

<style>

body{
background:#0f0f0f;
color:rgb(200, 189, 189);
font-family:sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
text-align:center;
}

h1{
font-weight:200;
letter-spacing:4px;
}

.pads{
display:grid;
grid-template-columns:repeat(2,140px);
gap:20px;
margin-top:40px;
}

.pad{
width:140px;
height:140px;
background:#1c1c1c;
border:none;
border-radius:10px;
cursor:pointer;
transition:.1s;
}

.pad.active{
background:#666;
}

</style>
</head>

<body>

<div class="container">

<h1>drakenfract</h1>

<div class="pads">
<button class="pad" data-pad="pad1"></button>
<button class="pad" data-pad="pad2"></button>
<button class="pad" data-pad="pad3"></button>
<button class="pad" data-pad="pad4"></button>
</div>

</div>

<script>

/* ---------- audio context ---------- */

let audioCtx = new (window.AudioContext || window.webkitAudioContext)()

document.body.addEventListener("click",()=>{
audioCtx.resume()
},{once:true})

/* ---------- shared delay space ---------- */

let masterGain = audioCtx.createGain()
masterGain.gain.value = 0.9

let delay = audioCtx.createDelay()
delay.delayTime.value = 0.28

let feedback = audioCtx.createGain()
feedback.gain.value = 0.35

let filter = audioCtx.createBiquadFilter()
filter.type = "lowpass"
filter.frequency.value = 3500

delay.connect(filter)
filter.connect(feedback)
feedback.connect(delay)

delay.connect(masterGain)
masterGain.connect(audioCtx.destination)

/* ---------- sample loading ---------- */

let buffers = {}

async function loadSample(name,file){

let response = await fetch(file)
let arrayBuffer = await response.arrayBuffer()

buffers[name] = await audioCtx.decodeAudioData(arrayBuffer)

console.log(name + " loaded")

}

Promise.all([
loadSample("metal","metal.mp3"),
loadSample("machine","machine.mp3"),
loadSample("voice","voice.mp3")
]).then(()=>{

console.log("all samples ready")

})

/* ---------- drift state ---------- */

let drift = {
metal: Math.random(),
machine: Math.random(),
voice: Math.random()
}

function updateDrift(){

drift.metal += 0.003 * (Math.random()-0.5)
drift.machine += 0.003 * (Math.random()-0.5)
drift.voice += 0.003 * (Math.random()-0.5)

for(let k in drift){
drift[k] = Math.max(0, Math.min(1, drift[k]))
}

}

setInterval(updateDrift,200)

/* ---------- granular engine ---------- */

function playGrain(sampleName,pitch=1){

let buffer = buffers[sampleName]
if(!buffer) return

let now = audioCtx.currentTime

let src = audioCtx.createBufferSource()
src.buffer = buffer

let gain = audioCtx.createGain()

let grainSize = 0.05 + Math.random()*0.05
let start = drift[sampleName] * buffer.duration

src.playbackRate.value = pitch + (Math.random()-0.5)*0.4

gain.gain.setValueAtTime(0,now)
gain.gain.linearRampToValueAtTime(0.5,now+0.01)
gain.gain.linearRampToValueAtTime(0,now+grainSize)

src.connect(gain)
gain.connect(delay)

src.start(now,start,grainSize)
src.stop(now+grainSize)

}

/* ---------- grain emitters ---------- */

let emitters = {}

function startEmitter(name){

emitters[name] = setInterval(()=>{

if(name==="pad1") playGrain("metal",0.8)
if(name==="pad2") playGrain("machine",1.2)
if(name==="pad3") playGrain("voice",0.7)
if(name==="pad4") playGrain("voice",-1.3)

},70 + Math.random()*40)

}

function stopEmitter(name){
clearInterval(emitters[name])
}

/* ---------- pad interaction ---------- */

document.querySelectorAll(".pad").forEach(pad=>{

let name = pad.dataset.pad
let active=false

function toggle(){

if(!active){

startEmitter(name)
pad.classList.add("active")
active=true

}else{

stopEmitter(name)
pad.classList.remove("active")
active=false

}

}

pad.addEventListener("click",toggle)

pad.addEventListener("touchstart",(e)=>{
e.preventDefault()
toggle()
})

})

</script>

</body>
</html>
