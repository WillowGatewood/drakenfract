<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>drakenfract</title>

<style>

body{
background:#0f0f0f;
color:white;
font-family:sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
text-align:center;
}

h1{
font-weight:200;
letter-spacing:4px;
}

.pads{
display:grid;
grid-template-columns:repeat(2,140px);
gap:20px;
margin-top:40px;
}

.pad{
width:140px;
height:140px;
background:#1c1c1c;
border:none;
border-radius:10px;
cursor:pointer;
transition:.15s;
}

.pad.active{
background:#666;
}

.pad.flash{
box-shadow:0 0 14px rgba(255,255,255,0.35);
transform:scale(1.03);
}

</style>
</head>

<body>

<div class="container">

<h1>drakenfract</h1>

<div class="pads">
<button class="pad" data-pad="pad1"></button>
<button class="pad" data-pad="pad2"></button>
<button class="pad" data-pad="pad3"></button>
<button class="pad" data-pad="pad4"></button>
</div>

</div>

<script>

/* AUDIO CONTEXT */

let audioCtx = new (window.AudioContext || window.webkitAudioContext)({latencyHint:"interactive"})

document.body.addEventListener("click", async () => {

await audioCtx.resume()

lastBeat = audioCtx.currentTime
pulse()

},{once:true})

/* TEMPO */

let bpm = 72
let beat = 60 / bpm

/* SHARED SPACE */

let masterGain = audioCtx.createGain()
masterGain.gain.value = 0.9

let delay = audioCtx.createDelay()
delay.delayTime.value = 0.32

let feedback = audioCtx.createGain()
feedback.gain.value = 0.22

let filter = audioCtx.createBiquadFilter()
filter.type = "lowpass"
filter.frequency.value = 3500

delay.connect(filter)
filter.connect(feedback)
feedback.connect(delay)

delay.connect(masterGain)
masterGain.connect(audioCtx.destination)

/* SAMPLE LOADING */

let buffers = {}
let samplesReady=false

async function loadSample(name,file){

let response = await fetch(file)
let arrayBuffer = await response.arrayBuffer()

buffers[name] = await audioCtx.decodeAudioData(arrayBuffer)

}

Promise.all([
loadSample("metal","metal.mp3"),
loadSample("machine","machine.mp3"),
loadSample("voice","voice.mp3")
]).then(()=>{

samplesReady=true
console.log("samples ready")

})

/* DRIFT FIELD */

let drift={
metal:Math.random(),
machine:Math.random(),
voice:Math.random()
}

let freeze=false

setInterval(()=>{

if(!freeze){

drift.metal +=0.002*(Math.random()-0.5)
drift.machine +=0.002*(Math.random()-0.5)
drift.voice +=0.002*(Math.random()-0.5)

}

for(let k in drift){
drift[k]=Math.max(0,Math.min(1,drift[k]))
}

},300)

/* OCCASIONAL FREEZE */

setInterval(()=>{
freeze=Math.random()<0.3
},6000)

/* VISUAL FLASH */

function flashPad(name){

let pad=document.querySelector(`[data-pad="${name}"]`)

pad.classList.add("flash")

setTimeout(()=>pad.classList.remove("flash"),120)

}

/* PENTATONIC PITCH FIELD */

const scale=[0.75,0.9,1,1.2,1.33]

function quantPitch(){

return scale[Math.floor(Math.random()*scale.length)]

}

/* GRAIN POOL */

const POOL_SIZE=10
let grainIndex=0
let gainPool=[]

for(let i=0;i<POOL_SIZE;i++){

let gain=audioCtx.createGain()
gain.connect(delay)

gainPool.push(gain)

}

/* GRAIN ENGINE */

function playGrain(sample,pitch=1,time=null){

let buffer=buffers[sample]
if(!buffer) return

let now=time || audioCtx.currentTime

let src=audioCtx.createBufferSource()
src.buffer=buffer

let gain=gainPool[grainIndex]
grainIndex=(grainIndex+1)%POOL_SIZE

let grainSize=0.07+Math.random()*0.03
let start=drift[sample]*buffer.duration

src.playbackRate.value=pitch*quantPitch()

gain.gain.cancelScheduledValues(now)
gain.gain.setValueAtTime(0,now)
gain.gain.linearRampToValueAtTime(0.45,now+0.01)
gain.gain.linearRampToValueAtTime(0,now+grainSize)

src.connect(gain)

src.start(now,start,grainSize)
src.stop(now+grainSize)

}

/* PAD STATE */

let padState={
pad1:false,
pad2:false,
pad3:false,
pad4:false
}

/* PULSE ENGINE */

let step=0
let lastBeat=0

function pulse(){

let now=audioCtx.currentTime

if(now-lastBeat>=beat){

triggerStep(now)
lastBeat=now
step++

}

requestAnimationFrame(pulse)

}

/* POLYRHYTHMIC STRUCTURE */

function triggerStep(time){

if(!samplesReady) return

if(padState.pad1 && step%1===0){
playGrain("metal",0.8,time)
if(Math.random()<0.7) flashPad("pad1")
}

if(padState.pad2 && step%2===0){
playGrain("machine",1,time)
if(Math.random()<0.7) flashPad("pad2")
}

if(padState.pad3 && step%3===0){
playGrain("voice",0.7,time)
if(Math.random()<0.7) flashPad("pad3")
}

if(padState.pad4 && step%4===0){
playGrain("voice",-1,time)
if(Math.random()<0.7) flashPad("pad4")
}

}

/* PAD INTERACTION */

document.querySelectorAll(".pad").forEach(pad=>{

let name=pad.dataset.pad

pad.addEventListener("click",toggle)
pad.addEventListener("touchstart",(e)=>{e.preventDefault();toggle()})

function toggle(){

if(!samplesReady) return

padState[name]=!padState[name]

pad.classList.toggle("active")

}

})

</script>

</body>
</html>
